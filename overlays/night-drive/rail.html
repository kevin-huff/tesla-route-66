<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ND · Live Rail</title>
<link rel="stylesheet" href="../vendor/maplibre-gl.css" />
<link rel="stylesheet" href="nd-tokens.css" />
<style>
  /* LIVE rail — full-canvas source over the camera. Rail occupies y 908-1080;
     ticker chips + map dock float above it (bottom 196). */
  .rail {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 172px;
    background: linear-gradient(180deg, rgba(10,12,15,0), rgba(10,12,15,.8) 32%, rgba(10,12,15,.94));
  }
  .rail .row {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    padding: 24px 72px 30px;
  }
  .cell { padding: 0 48px; border-left: 1px solid var(--hairline); }
  .cell:first-child, .cell.wordmark { border-left: none; padding-left: 0; }
  .spacer { flex: 1; }

  .cell .c-label { margin-bottom: 10px; }
  .cell .c-value {
    font: 500 40px var(--font-data);
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    line-height: 1;
    white-space: nowrap;
  }
  .cell .c-unit { font: 500 16px var(--font-data); color: var(--text-secondary); margin-left: 8px; }

  /* state cell (primary) */
  .cell.state { position: relative; }
  .cell.state .c-label.riding { color: var(--volt); }
  .cell.state .c-value { font-weight: 600; font-size: 50px; }
  .cell.state .c-value.idle { color: var(--text-dim); }
  .cell.state .nd-pulse { position: absolute; left: 48px; right: 48px; bottom: -16px; }

  .cell.earnings .c-value { color: var(--volt); }

  /* pre-shift + reconnecting states */
  body.preshift .live-only { display: none; }
  body:not(.preshift) .pre-only { display: none; }
  .pre-clock { font: 500 40px var(--font-data); color: var(--text-dim); line-height: 1; white-space: nowrap; }
  .pre-month { font: 500 24px var(--font-data); color: var(--text-secondary); line-height: 1.3; white-space: nowrap; }
  body.stale .freezeable { opacity: .45; }
  .freezeable { transition: opacity 300ms ease; }

  /* floats */
  .ticker {
    position: absolute; left: 72px; bottom: 196px;
    display: flex; flex-direction: column-reverse; gap: 12px;
    align-items: flex-start;
  }
  .dock {
    position: absolute; right: 72px; bottom: 196px;
    width: 420px; height: 290px;
  }
  .event-slot { position: absolute; right: 508px; bottom: 196px; }

  body.collapse .cell.earnings, body.collapse .cell.rides { display: none; }

  /* 48px action-safe guide (dev) */
  body.guide::after {
    content: '';
    position: absolute; inset: 48px;
    border: 1px dashed rgba(200,245,66,.25);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="rail">
    <div class="row">
      <div class="cell wordmark">
        <div class="nd-wordmark" id="wordmark">
          <div class="wm-title">THE KEVIN SHOW</div>
          <div class="wm-sub"><span class="nd-dot blink" id="wmDot"></span><span id="wmSub">LIVE · NIGHT DRIVE</span></div>
        </div>
      </div>

      <div class="cell state live-only freezeable">
        <div class="c-label nd-label" id="stateLabel">IDLE</div>
        <div class="c-value idle num" id="stateClock">0:00</div>
        <div class="nd-pulse" id="statePulse"></div>
      </div>
      <div class="cell live-only freezeable">
        <div class="c-label nd-label">SHIFT</div>
        <div class="c-value num" id="shiftClock">0:00:00</div>
      </div>
      <div class="cell live-only freezeable">
        <div class="c-label nd-label">SPEED</div>
        <div class="c-value num"><span id="speed">0</span><span class="c-unit">MPH</span></div>
      </div>
      <div class="cell live-only freezeable">
        <div class="c-label nd-label">TEMP</div>
        <div class="c-value num"><span id="temp">--</span><span class="c-unit">°F</span></div>
      </div>

      <div class="cell pre-only">
        <div class="c-label nd-label">SHIFT STARTS</div>
        <div class="pre-clock" id="preStarts">— 9:00 PM</div>
      </div>

      <div class="spacer"></div>

      <div class="cell earnings live-only freezeable">
        <div class="c-label nd-label">EARNINGS TODAY</div>
        <div class="nd-odo" id="odo"></div>
      </div>
      <div class="cell rides live-only freezeable">
        <div class="c-label nd-label">RIDES</div>
        <div class="c-value num" id="rides">0</div>
      </div>

      <div class="cell pre-only">
        <div class="c-label nd-label">MONTH</div>
        <div class="pre-month" id="preMonth">$0.00 · 0 RIDES</div>
      </div>
    </div>
  </div>

  <div class="ticker" id="ticker"></div>
  <div class="dock" id="dock"></div>

  <div class="event-slot">
    <div class="nd-event" id="eventCard">
      <div class="ev-label">RIDE COMPLETE</div>
      <div class="ev-main"><span class="ev-value">+$0.00</span><span class="ev-sub"></span></div>
      <div class="ev-underline"></div>
    </div>
  </div>

  <div class="dev">
    <button onclick="document.body.classList.toggle('collapse')">totals</button>
    <button onclick="document.body.classList.toggle('guide')">guide</button>
    <button onclick="document.body.classList.toggle('preshift')">pre-shift</button>
    <button onclick="document.body.classList.toggle('stale'); syncStale()">stale</button>
  </div>

<script src="config/nd-config.js"></script>
<script src="config/map-style-night.js"></script>
<script src="../vendor/maplibre-gl.js"></script>
<script src="js/nd-ui.js"></script>
<script src="js/nd-demo.js"></script>
<script src="js/nd-client.js"></script>
<script src="js/nd-map.js"></script>
<script>
(function () {
  const { fmt, createOdometer, pulse, createTimers, renderTicker, createEventCard } = ND_UI;
  const $ = (id) => document.getElementById(id);

  if (ND.params.has('collapse')) document.body.classList.add('collapse');

  const odo = createOdometer($('odo'));
  odo.setCents(0);
  const events = createEventCard($('eventCard'), { holdMs: ND.config.eventHoldMs || 6000 });
  ND_MAP.attach($('dock'), ND);

  let cur = null; // last stats payload

  const timers = createTimers(ND.serverNow);
  timers.register($('stateClock'), () => cur?.ride?.startedAt || cur?.idleStartedAt || null, fmt.mss);
  timers.register($('shiftClock'), () => (cur?.shift?.status === 'live' ? cur.shift.startedAt : null), fmt.hmmss, '0:00:00');

  function render(stats, ticker) {
    cur = stats;
    const riding = !!stats.ride;
    document.body.classList.toggle('preshift', stats.shift.status !== 'live');

    $('stateLabel').textContent = riding ? 'RIDE · TRIP TIME' : 'IDLE';
    $('stateLabel').classList.toggle('riding', riding);
    $('stateLabel').classList.toggle('nd-label', true);
    $('stateClock').classList.toggle('idle', !riding);

    odo.setCents(stats.today.earningsCents);
    $('rides').textContent = stats.today.rides;
    $('preStarts').textContent = `— ${stats.shift.startsAt || 'SOON'}`;
    $('preMonth').textContent = `${fmt.usd(stats.month.earningsCents)} · ${stats.month.rides} RIDES`;
    if (ticker) renderTicker($('ticker'), ticker);
    timers.tick();
  }

  ND.on('ride', (d) => render(d.stats, d.ticker));
  ND.on('stats_tick', (d) => render(d.stats, d.ticker));
  ND.on('shift_started', (d) => { render(d.stats, d.ticker); pulse($('statePulse')); });

  ND.on('ride_started', (d) => {
    render(d.stats, d.ticker);
    pulse($('statePulse'));
    events.push({ kind: 'ride_start', label: 'RIDE START', value: `RIDE #${d.ride.n}`, whiteValue: true, sub: 'PICKUP' });
  });
  ND.on('ride_ended', (d) => {
    render(d.stats, d.ticker);
    renderTicker($('ticker'), d.ticker || [], { animateNewest: true });
    pulse($('statePulse'));
    events.push({ kind: 'ride_end', label: 'RIDE COMPLETE', value: `+${fmt.usd(d.ride.fareCents)}`, sub: `RIDE #${d.ride.n} · ${fmt.mss(d.ride.durSec)}` });
  });
  ND.on('tip_added', (d) => {
    render(d.stats, d.ticker);
    renderTicker($('ticker'), d.ticker || []);
    pulse($('statePulse'));
    events.push({ kind: 'tip', label: 'TIP ADDED', value: `+${fmt.usd(d.tip.amountCents)}`, sub: d.ride ? `RIDE #${d.ride.n}` : '' });
  });
  ND.on('shift_ended', (d) => render(d.stats));
  ND.on('personal_best', (d) => {
    events.push({ kind: 'pb', label: '◆ PERSONAL BEST', value: d.label, whiteValue: true, sub: d.sub });
  });
  ND.on('alert', (a) => {
    if (a.kind === 'follow') events.push({ kind: 'follow', label: 'NEW FOLLOWER', grayLabel: true, value: a.name || '', whiteValue: true, sub: '' });
    else if (a.kind === 'sub') events.push({ kind: 'sub', label: 'NEW SUB', grayLabel: true, value: a.name || '', whiteValue: true, sub: a.detail || 'TIER 1' });
  });

  // reconnecting / data-stale — quiet, not an error
  window.syncStale = function () {
    const stale = document.body.classList.contains('stale');
    $('wmDot').className = `nd-dot ${stale ? 'amber' : 'blink'}`;
    $('wmSub').textContent = stale ? 'RECONNECTING · DATA HELD' : 'LIVE · NIGHT DRIVE';
    $('wordmark').classList.toggle('stale', stale);
    if (stale) $('speed').textContent = '––';
  };
  ND.on('stale', ({ stale }) => {
    document.body.classList.toggle('stale', stale);
    syncStale();
  });

  ND.on('telemetry', (t) => {
    if (!document.body.classList.contains('stale')) $('speed').textContent = Math.round(t.speedMph || 0);
    if (t.outsideF != null) $('temp').textContent = Math.round(t.outsideF);
  });

  // pre-shift wordmark state
  ND.on('ride', syncPre); ND.on('stats_tick', syncPre); ND.on('shift_started', syncPre); ND.on('shift_ended', syncPre);
  function syncPre() {
    if (document.body.classList.contains('stale')) return;
    const pre = document.body.classList.contains('preshift');
    $('wmDot').className = `nd-dot ${pre ? 'gray' : 'blink'}`;
    $('wmSub').textContent = pre ? 'OFFLINE · NIGHT DRIVE' : 'LIVE · NIGHT DRIVE';
  }
})();
</script>
</body>
</html>
