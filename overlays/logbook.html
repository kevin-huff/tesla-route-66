<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logbook Counters — The Kevin Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="overlay-system.css">
<style>
  html, body { height:100%; }
  body.ovl { display:flex; align-items:center; justify-content:center; padding:40px; }

  .log {
    width: 1500px;
    /* punch-card clipped top-left corner */
    clip-path: polygon(34px 0, 100% 0, 100% 100%, 0 100%, 0 34px);
  }
  .log-head {
    display:flex; align-items:center; gap:14px; padding: 2px 26px 0;
  }
  .log-head .title { font-family:var(--font-display); font-size:16px; letter-spacing:.1em; color:var(--amber); text-shadow:var(--glow-amber-soft); }
  .log-head .sub { font-family:var(--font-label); font-size:12px; letter-spacing:.22em; color:var(--amber-dim); }
  .log-head .punchrow { margin-left:auto; display:flex; gap:6px; }
  .log-head .punchrow i {
    width:13px; height:8px; border-radius:1px; background:#060402;
    box-shadow: inset 0 1px 2px rgba(0,0,0,.9), 0 0 0 1px rgba(255,176,0,.1);
  }
  .log-head .punchrow i.filled { background: var(--amber-deep); box-shadow:0 0 6px rgba(255,176,0,.3); }

  /* two rotating pages, stacked + crossfaded (CRT page flip) */
  .pages { position:relative; margin-top: 14px; }
  .counters {
    display:grid; grid-template-columns: repeat(5, 1fr);
    transition: opacity .35s ease;
  }
  .counters:not(.active) { opacity:0; position:absolute; inset:0; pointer-events:none; }
  .counters.active { opacity:1; position:relative; }
  .cell {
    position:relative; padding: 6px 26px 10px;
    display:flex; flex-direction:column; gap:10px;
  }
  .cell + .cell::before {
    content:""; position:absolute; left:0; top:8px; bottom:8px; width:1px;
    background: linear-gradient(180deg, transparent, var(--amber-deep), transparent);
  }
  .cell .clabel {
    font-family:var(--font-label); font-size:12px; letter-spacing:.16em; color:var(--amber);
    text-transform:uppercase; display:flex; align-items:center; gap:8px;
  }
  .cell .num {
    font-family:var(--font-num7); font-size:50px; color:#FFD86A;  /* hotter lit core so digits pop */
    /* tighter glow than the shared one — keeps the digits crisp instead of blooming together */
    text-shadow:0 0 2px rgba(255,176,0,.6), 0 0 6px rgba(255,140,0,.3);
    letter-spacing:.06em; display:flex; align-items:baseline; gap:8px;
  }
  .seg-wrap { position:relative; }
  /* ghost placeholder digits removed — they muddied contrast and made short values (esp.
     elevation, value shorter than the 6-digit placeholder) look zero-padded */
  .seg-wrap .ghost { display:none; }
  .cell .unit { font-family:var(--font-display); font-size:15px; color:var(--amber); letter-spacing:.04em; }
  .cell .frac { font-family:var(--font-num7); font-size:24px; color:var(--amber-dim); }
  .cell .cur  { font-family:var(--font-display); font-size:26px; color:var(--amber); margin-right:2px; }

  /* small chrome glyph badge per counter */
  .glyph {
    width:18px; height:18px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #cfcfcf, #6a6a6a 60%, #2a2a2a);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5), 0 1px 2px rgba(0,0,0,.7);
    display:inline-block;
  }
  .glyph.on { background: radial-gradient(circle at 38% 35%, var(--amber-bright), var(--amber) 50%, #6a3d00); box-shadow: var(--glow-amber-soft); }

  /* bypassed = struck-through "flex" tag */
  .flex-tag {
    font-family:var(--font-label); font-size:10px; letter-spacing:.14em;
    color: var(--klaxon); border:1px solid var(--klaxon-dim); border-radius:3px;
    padding:1px 5px; text-decoration: line-through; opacity:.85;
  }
</style>
</head>
<body class="ovl crt-flicker" data-screen-label="Logbook Counters">
  <div class="log panel">
    <span class="panel-glass"></span>
    <span class="rivets"><i></i><i></i><i></i><i></i></span>

    <div class="panel-inner">
      <div class="log-head">
        <span class="title">FLIGHT LOG</span>
        <span class="sub" id="pagesub">· CUMULATIVE · PG 1/2 · THE TRIP</span>
        <span class="punchrow" id="punch"></span>
      </div>

      <div class="pages">
        <!-- PG 1 · THE TRIP -->
        <div class="counters active" id="page1">
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>MILES LOGGED</div>
            <div class="num"><span class="seg-wrap"><span data-key="miles" data-comma="1">0</span></span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>ROUTE COMPLETE</div>
            <div class="num"><span class="seg-wrap"><span data-key="routePct">0</span></span><span class="unit">%</span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>WAYPOINTS LOGGED</div>
            <div class="num"><span class="seg-wrap"><span data-key="waypoints">0</span></span><span class="frac" id="wptotal">/58</span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>STATES CROSSED</div>
            <div class="num"><span class="seg-wrap"><span data-key="states">0</span></span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>DAYS ON ROAD</div>
            <div class="num"><span class="seg-wrap"><span data-key="days">0</span></span></div>
          </div>
        </div>

        <!-- PG 2 · POWERTRAIN -->
        <div class="counters" id="page2">
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>ENERGY CHARGED</div>
            <div class="num"><span class="seg-wrap"><span data-key="kwhCharged" data-comma="1">0</span></span><span class="unit">KWH</span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>SUPERCHARGERS DOCKED</div>
            <div class="num"><span class="seg-wrap"><span data-key="superchargers">0</span></span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph"></span>GAS MONEY SAVED <span class="flex-tag">NO GAS</span></div>
            <div class="num"><span class="cur">$</span><span class="seg-wrap"><span data-key="gasSaved" data-comma="1">0</span></span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>DRIVE TIME</div>
            <div class="num"><span class="seg-wrap"><span data-key="driveHrs" data-dec="1">0</span></span><span class="unit">HRS</span></div>
          </div>
          <div class="cell">
            <div class="clabel"><span class="glyph on"></span>CHARGE TIME</div>
            <div class="num"><span class="seg-wrap"><span data-key="chargeHrs" data-dec="1">0</span></span><span class="unit">HRS</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="config/overlay-config.js"></script>
<script src="js/demo-data.js"></script>
<script src="js/telemetry-client.js"></script>
<script>
  const client = window.R66;
  const punch = document.getElementById('punch');

  function renderPunch(legsDone){
    punch.innerHTML = '';
    for (let i=0;i<6;i++){
      const el = document.createElement('i');
      if (i < legsDone) el.classList.add('filled');
      punch.appendChild(el);
    }
  }
  renderPunch(0);

  function fmt(n, comma, dec){
    if (dec) return Number(n).toFixed(dec);
    return comma ? Number(Math.round(n)).toLocaleString('en-US') : String(Math.round(n));
  }

  function countUp(el, to){
    const comma = el.dataset.comma;
    const dec = Number(el.dataset.dec) || 0;
    const from = Number(String(el.textContent).replace(/[^\d.-]/g,'')) || 0;
    if (from === to){ el.textContent = fmt(to, comma, dec); return; }
    const token = (Number(el.dataset.tok)||0) + 1;
    el.dataset.tok = token;
    const dur = 700;
    const start = performance.now();
    function tick(now){
      if (Number(el.dataset.tok) !== token) return;
      const t = Math.min(1,(now-start)/dur);
      const ease = 1-Math.pow(1-t,3);
      el.textContent = fmt(from + (to-from)*ease, comma, dec);
      if (t<1) requestAnimationFrame(tick); else el.textContent = fmt(to, comma, dec);
    }
    requestAnimationFrame(tick);
  }

  const KEYS = ['miles','routePct','waypoints','states','days',
                'kwhCharged','superchargers','gasSaved','driveHrs','chargeHrs'];
  let first = true;
  client.on('logbook', (d)=>{
    if (!d) return;
    KEYS.forEach((k, i)=>{
      const el = document.querySelector(`[data-key="${k}"]`);
      if (!el || d[k] == null) return;
      el.dataset.to = d[k];
      if (first) setTimeout(()=>countUp(el, +d[k]), 120 + (i%5)*100);
      else countUp(el, +d[k]);
    });
    if (d.totalWaypoints) {
      const wt = document.getElementById('wptotal');
      if (wt) wt.textContent = '/' + d.totalWaypoints;
    }
    renderPunch(d.legsDone || 0);
    first = false;
  });

  // page rotation — CRT crossfade between THE TRIP and POWERTRAIN. ?page=1|2 pins
  // a page (handy for OBS layout work); values keep updating on the hidden page.
  const SUBS = ['· CUMULATIVE · PG 1/2 · THE TRIP', '· CUMULATIVE · PG 2/2 · POWERTRAIN'];
  const pageEls = [document.getElementById('page1'), document.getElementById('page2')];
  const pagesub = document.getElementById('pagesub');
  const pinned = Number(client.params.get('page')) || 0;
  let pg = pinned ? pinned - 1 : 0;
  function showPage(n){
    pg = n % 2;
    pageEls.forEach((el, i)=>{ if (el) el.classList.toggle('active', i === pg); });
    if (pagesub) pagesub.textContent = SUBS[pg];
  }
  showPage(pg);
  if (!pinned) setInterval(()=>showPage(pg + 1), 12000);
</script>
</body>
</html>
